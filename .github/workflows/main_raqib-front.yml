name: Build and deploy Node.js app to Azure Web App - raqib-front

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_URL: https://raqib-api-hce8deejh7ejcjbx.polandcentral-01.azurewebsites.net
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend
          path: .

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: raqib-front
          slot-name: Production
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_46FAAB927C8D4E4A8D2BCC84301F0B60 }}
          package: .
